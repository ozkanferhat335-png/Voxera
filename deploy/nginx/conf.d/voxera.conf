# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name api.voxera.io app.voxera.io voxera.io;
    return 301 https://$host$request_uri;
}

# API Server
server {
    listen 443 ssl http2;
    server_name api.voxera.io;

    ssl_certificate /etc/nginx/certs/api.voxera.io.crt;
    ssl_certificate_key /etc/nginx/certs/api.voxera.io.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # API endpoints
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://voxera_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Auth endpoints - stricter rate limiting
    location /api/v1/auth/login {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://voxera_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SignalR WebSocket
    location /hubs/ {
        proxy_pass http://voxera_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Swagger UI
    location /swagger {
        proxy_pass http://voxera_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        proxy_pass http://voxera_api;
        access_log off;
    }
}

# Web Panel
server {
    listen 443 ssl http2;
    server_name app.voxera.io;

    ssl_certificate /etc/nginx/certs/app.voxera.io.crt;
    ssl_certificate_key /etc/nginx/certs/app.voxera.io.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://voxera_webpanel;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SPA routing
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        proxy_pass http://voxera_webpanel;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
