#!KAMAILIO
#
# Voxera Kamailio SIP Proxy Configuration
# Version: 5.7
# Purpose: SIP load balancing, authentication, and routing
#

####### Global Parameters #########

debug=2
log_stderror=no
log_facility=LOG_LOCAL0
log_prefix="{$mt $hdr(CSeq) $ci} "

fork=yes
children=8

# SIP ports
port=5060
listen=udp:0.0.0.0:5060
listen=tcp:0.0.0.0:5060
listen=tls:0.0.0.0:5061

# TLS
enable_tls=1
tls_verify_server=1
tls_verify_client=1
tls_require_client_certificate=0
tls_method=TLSv1.2

# Aliases
alias="sip.voxera.io"

####### Modules Section ########

mpath="/usr/lib/x86_64-linux-gnu/kamailio/modules/"

loadmodule "jsonrpcs.so"
loadmodule "kex.so"
loadmodule "corex.so"
loadmodule "tm.so"
loadmodule "tmx.so"
loadmodule "sl.so"
loadmodule "rr.so"
loadmodule "pv.so"
loadmodule "maxfwd.so"
loadmodule "usrloc.so"
loadmodule "registrar.so"
loadmodule "textops.so"
loadmodule "textopsx.so"
loadmodule "siputils.so"
loadmodule "xlog.so"
loadmodule "sanity.so"
loadmodule "ctl.so"
loadmodule "cfg_rpc.so"
loadmodule "acc.so"
loadmodule "counters.so"
loadmodule "db_postgres.so"
loadmodule "auth.so"
loadmodule "auth_db.so"
loadmodule "dispatcher.so"
loadmodule "htable.so"
loadmodule "pike.so"
loadmodule "nathelper.so"
loadmodule "rtpengine.so"
loadmodule "tls.so"

####### Setting module-specific parameters ########

# Database
modparam("db_postgres", "con_param", "host=postgres;port=5432;dbname=voxera;user=voxera;password=voxera_pass")

# Auth DB
modparam("auth_db", "db_url", "postgres://voxera:voxera_pass@postgres:5432/voxera")
modparam("auth_db", "user_column", "username")
modparam("auth_db", "password_column", "password_hash")
modparam("auth_db", "table", "sip_accounts")
modparam("auth_db", "calculate_ha1", 1)
modparam("auth_db", "use_domain", 1)

# User Location
modparam("usrloc", "db_url", "postgres://voxera:voxera_pass@postgres:5432/voxera")
modparam("usrloc", "db_mode", 2)
modparam("usrloc", "use_domain", 1)

# Registrar
modparam("registrar", "method_filtering", 1)
modparam("registrar", "max_expires", 3600)
modparam("registrar", "min_expires", 60)
modparam("registrar", "default_expires", 300)

# Dispatcher (Load Balancing to FreeSWITCH)
modparam("dispatcher", "db_url", "postgres://voxera:voxera_pass@postgres:5432/voxera")
modparam("dispatcher", "ds_ping_interval", 10)
modparam("dispatcher", "ds_probing_mode", 1)

# NAT Helper
modparam("nathelper", "natping_interval", 30)
modparam("nathelper", "ping_nated_only", 1)
modparam("nathelper", "sipping_bflag", 7)
modparam("nathelper", "sipping_from", "sip:pinger@sip.voxera.io")

# RTPEngine
modparam("rtpengine", "rtpengine_sock", "udp:127.0.0.1:2223")

# Pike (DDoS protection)
modparam("pike", "sampling_time_unit", 2)
modparam("pike", "reqs_density_per_unit", 30)
modparam("pike", "remove_latency", 4)

# HTable (for rate limiting)
modparam("htable", "htable", "ipban=>size=8;autoexpire=300;")

# Accounting
modparam("acc", "db_url", "postgres://voxera:voxera_pass@postgres:5432/voxera")
modparam("acc", "db_flag", 1)
modparam("acc", "db_missed_flag", 2)

####### Routing Logic ########

request_route {
    # Per-request initial checks
    route(REQINIT);

    # NAT detection
    route(NATDETECT);

    # CANCEL processing
    if (is_method("CANCEL")) {
        if (t_check_trans()) {
            route(RELAY);
        }
        exit;
    }

    # Handle retransmissions
    if (!is_method("ACK")) {
        if (t_precheck_trans()) {
            t_check_trans();
            exit;
        }
        t_check_trans();
    }

    # Handle requests within SIP dialogs
    route(WITHINDLG);

    # Only initial requests (no To tag)
    remove_hf("Route");
    if (is_method("INVITE|SUBSCRIBE")) {
        record_route();
    }

    # Account only INVITEs
    if (is_method("INVITE")) {
        setflag(1);  # do accounting
    }

    # Dispatch requests to servers
    route(DISPATCH);
}

route[REQINIT] {
    # Flood detection
    if ($sht(ipban=>$si) != $null) {
        xdbg("request from blocked IP - $rm from $fu (IP:$si:$sp)\n");
        exit;
    }

    if (!pike_check_req()) {
        xlog("L_ALERT","PIKE blocking $rm from $fu (IP:$si:$sp)\n");
        $sht(ipban=>$si) = 1;
        exit;
    }

    if ($ua =~ "friendly-scanner|sipcli|VaxSIPUserAgent") {
        sl_send_reply("200", "OK");
        exit;
    }

    if (!mf_process_maxfwd_header("10")) {
        sl_send_reply("483","Too Many Hops");
        exit;
    }

    if (is_method("OPTIONS") && uri==myself && $rU==$null) {
        sl_send_reply("200","Keepalive");
        exit;
    }

    if (!sanity_check("17895", "7")) {
        xlog("Malformed SIP message from $si:$sp\n");
        exit;
    }
}

route[NATDETECT] {
    force_rport();
    if (nat_uac_test("19")) {
        if (is_method("REGISTER")) {
            fix_nated_register();
        } else {
            if (is_first_hop()) {
                set_contact_alias();
            }
        }
        setflag(6);
    }
    return;
}

route[WITHINDLG] {
    if (!has_totag()) return;

    if (loose_route()) {
        route(DLGURI);
        if (is_method("BYE")) {
            setflag(1);  # accounting
            setflag(2);  # missed call accounting
        } else if (is_method("NOTIFY")) {
            record_route();
        }
        route(RELAY);
        exit;
    }

    if (is_method("SUBSCRIBE") && uri==myself) {
        route(PRESENCE);
        exit;
    }

    if (!is_method("ACK")) {
        sl_send_reply("404","Not here");
        exit;
    }
}

route[DISPATCH] {
    # Authentication
    if (is_method("REGISTER")) {
        route(REGISTRAR);
        exit;
    }

    if (is_method("INVITE")) {
        if (!auth_check("$fd", "sip_accounts", "1")) {
            auth_challenge("$fd", "0");
            exit;
        }
        consume_credentials();
    }

    # Route to FreeSWITCH
    if (!ds_select_dst("1", "4")) {
        send_reply("503", "Service Unavailable");
        exit;
    }

    route(RELAY);
    exit;
}

route[REGISTRAR] {
    if (!is_method("REGISTER")) return;

    if (!auth_check("$td", "sip_accounts", "1")) {
        auth_challenge("$td", "0");
        exit;
    }
    consume_credentials();

    if (!save("location")) {
        sl_reply_error();
    }
    exit;
}

route[RELAY] {
    if (is_method("INVITE")) {
        if (!t_is_set("branch_route")) {
            t_on_branch("MANAGE_BRANCH");
        }
        if (!t_is_set("onreply_route")) {
            t_on_reply("MANAGE_REPLY");
        }
        if (!t_is_set("failure_route")) {
            t_on_failure("MANAGE_FAILURE");
        }
    }

    if (!t_relay()) {
        sl_reply_error();
    }
    exit;
}

route[DLGURI] {
    if (!isdsturiset()) {
        handle_ruri_alias();
    }
    return;
}

route[PRESENCE] {
    if (!t_newtran()) {
        sl_reply_error();
        exit;
    }
    sl_send_reply("200", "OK");
    exit;
}

branch_route[MANAGE_BRANCH] {
    xdbg("new branch [$T_branch_idx] to $ru\n");
    route(NATMANAGE);
}

onreply_route[MANAGE_REPLY] {
    xdbg("incoming reply\n");
    if (status=~"[12][0-9][0-9]") {
        route(NATMANAGE);
    }
}

failure_route[MANAGE_FAILURE] {
    route(NATMANAGE);
    if (t_is_canceled()) exit;
}

route[NATMANAGE] {
    if (is_request()) {
        if (has_totag()) {
            if (check_route_param("nat=yes")) {
                setbflag(6);
            }
        }
    }
    if (!(isflagset(6) || isbflagset(6))) return;

    if (is_request()) {
        if (!has_totag()) {
            if (t_is_branch_route()) {
                add_rr_param(";nat=yes");
            }
        }
    }
    if (is_reply()) {
        if (isbflagset(6)) {
            set_contact_alias();
        }
    }
    return;
}
